name: PR File Check

on:
  pull_request:
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v44

      - name: Check allowed files
        env:
          CHANGED_FILES: ${{ steps.files.outputs.all_changed_files }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH_NAME"
          echo "Changed files: $CHANGED_FILES"

          # Extract branch prefix and table/tool name
          if [[ "$BRANCH_NAME" =~ ^add/(.+)$ ]]; then
            TABLE_NAME="${BASH_REMATCH[1]^^}"
            ALLOWED_PATTERNS=(
              "tools/info-converter/info-files/${TABLE_NAME}.info"
              "table-definitions/${TABLE_NAME}/${TABLE_NAME}.json"
              "table-definitions/${TABLE_NAME}/${TABLE_NAME}.dat"
              "table-definitions/${TABLE_NAME}/sql/.*\.sql"
            )
            PR_TYPE="add-table"
          elif [[ "$BRANCH_NAME" =~ ^update/(.+)$ ]]; then
            TABLE_NAME="${BASH_REMATCH[1]^^}"
            ALLOWED_PATTERNS=(
              "table-definitions/${TABLE_NAME}/${TABLE_NAME}.json"
              "table-definitions/${TABLE_NAME}/${TABLE_NAME}.dat"
              "table-definitions/${TABLE_NAME}/sql/.*\.sql"
            )
            PR_TYPE="update-table"
          elif [[ "$BRANCH_NAME" =~ ^tool/update/ ]]; then
            ALLOWED_PATTERNS=(
              "tools/info-converter/convert.py"
              "tools/page-generator/generate.py"
            )
            PR_TYPE="update-tool"
          elif [[ "$BRANCH_NAME" =~ ^tool/add/ ]]; then
            ALLOWED_PATTERNS=(
              "tools/[^/]+/.*\.py"
            )
            PR_TYPE="add-tool"
          else
            echo "Branch name doesn't match expected patterns (add/, update/, tool/update/, tool/add/)"
            echo "Skipping file restrictions check"
            exit 0
          fi

          echo "PR type: $PR_TYPE"
          echo "Allowed patterns:"
          printf '  %s\n' "${ALLOWED_PATTERNS[@]}"

          INVALID_FILES=()

          for file in $CHANGED_FILES; do
            MATCHED=false
            for pattern in "${ALLOWED_PATTERNS[@]}"; do
              if [[ "$file" =~ ^${pattern}$ ]]; then
                MATCHED=true
                break
              fi
            done

            if [[ "$MATCHED" == "false" ]]; then
              INVALID_FILES+=("$file")
            fi
          done

          if [[ ${#INVALID_FILES[@]} -gt 0 ]]; then
            echo ""
            echo "❌ PR contains files not allowed for $PR_TYPE PRs:"
            printf '  - %s\n' "${INVALID_FILES[@]}"
            echo ""
            echo "See CONTRIBUTING.md for allowed files per PR type."
            exit 1
          fi

          echo ""
          echo "✅ All files are allowed for $PR_TYPE PRs"
